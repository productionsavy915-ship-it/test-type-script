steps:
  # ─────────────────────────────────────────────────────
  # Step 1: Build Docker image
  # ─────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - '.'

  # ─────────────────────────────────────────────────────
  # Step 2: Push image ke Artifact Registry
  # ─────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME'
    waitFor: ['build-image']

  # ─────────────────────────────────────────────────────
  # Step 3: Deploy ke Cloud Run
  # ─────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--port=3000'
      - '--concurrency=80'
      - '--min-instances=$_MIN_INSTANCES'
      - '--max-instances=$_MAX_INSTANCES'
      - '--memory=$_MEMORY'
      - '--cpu=$_CPU'
      - '--timeout=60'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-image']

# ─────────────────────────────────────────────────────
# Images yang di-push ke Artifact Registry
# ─────────────────────────────────────────────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'

# ─────────────────────────────────────────────────────
# Substitution variables (override saat trigger atau manual submit)
# ─────────────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2             # Jakarta region
  _REPO: vega-cloud-repo             # Artifact Registry repository name
  _SERVICE_NAME: vega-cloud         # Cloud Run service name
  _MIN_INSTANCES: '1'            # Scale-to-zero (hemat biaya)
  _MAX_INSTANCES: '5'                 # Max instances
  _MEMORY: 256Mi                      # Memory per instance
  _CPU: '1'                           # CPU per instance

# ─────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
